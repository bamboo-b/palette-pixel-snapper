<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pixel Snapper</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        max-width: 960px;
        margin: 2rem auto;
        padding: 0 1rem;
        color: #1a1a2e;
      }
      h1 { margin-bottom: 0.25rem; }
      .hint { color: #666; margin-top: 0; }
      #drop {
        border: 2px dashed #888;
        border-radius: 8px;
        padding: 2rem;
        text-align: center;
        transition: background 0.15s, border-color 0.15s;
      }
      #drop.dragover { border-color: #2a7; background: #f0fff8; }
      .palette { margin: 1rem 0; }
      .palette > label { display: block; margin-bottom: 0.35rem; font-weight: 600; }
      #paletteText {
        width: 100%;
        box-sizing: border-box;
        font-family: ui-monospace, monospace;
        font-size: 0.9rem;
        padding: 0.5rem;
        border: 1px solid #888;
        border-radius: 6px;
        resize: vertical;
      }
      .presets { display: flex; flex-wrap: wrap; gap: 0.4rem 0.9rem; align-items: center; margin-top: 0.6rem; }
      .presets .pgroup { display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.85rem; }
      .presets .pgroup b { color: #555; font-weight: 600; }
      .presets button { padding: 0.2rem 0.55rem; font-size: 0.85rem; }
      .swatches { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 0.5rem; }
      .swatches span {
        width: 22px;
        height: 22px;
        border-radius: 4px;
        border: 1px solid rgba(0, 0, 0, 0.2);
        cursor: pointer;
        transition: opacity 0.1s, filter 0.1s;
      }
      .swatches span.off { opacity: 0.25; filter: grayscale(1); }
      .swatches span.base { outline: 2px solid #2a7; outline-offset: 1px; }
      .row { display: flex; gap: 1rem; align-items: center; margin: 1rem 0; flex-wrap: wrap; }
      button { padding: 0.45rem 0.9rem; border-radius: 6px; border: 1px solid #888; background: #fff; cursor: pointer; }
      button:disabled { opacity: 0.5; cursor: default; }
      #run { background: #2a7; color: #fff; border-color: #2a7; font-weight: 600; }
      #status { min-height: 1.3em; color: #555; margin-top: 0.5rem; }
      .previews { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 1rem; }
      .previews figure { flex: 1 1 320px; margin: 0; }
      .previews figcaption { color: #666; font-size: 0.9rem; margin-bottom: 0.25rem; }
      .previews img {
        width: 100%;
        image-rendering: pixelated;
        border: 1px solid #ddd;
        border-radius: 4px;
        background: repeating-conic-gradient(#eee 0 25%, #fff 0 50%) 0 0 / 20px 20px;
        min-height: 80px;
      }
      .actual { margin-top: 1rem; }
      .actual figcaption { color: #666; font-size: 0.9rem; margin-bottom: 0.25rem; }
      .actual-box {
        display: inline-block;
        max-width: 100%;
        overflow: auto;
        border: 1px solid #ddd;
        border-radius: 4px;
        background: repeating-conic-gradient(#eee 0 25%, #fff 0 50%) 0 0 / 20px 20px;
      }
      #actual { display: block; image-rendering: pixelated; }
    </style>
  </head>
  <body>
    <h1>Pixel Snapper</h1>
    <p class="hint">Snap messy / AI-generated pixel art to a clean grid - runs fully in your browser (WASM).</p>

    <div id="drop">
      Drag &amp; drop an image here, or
      <input type="file" id="file" accept="image/png,image/jpeg" />
    </div>

    <div class="palette">
      <label for="paletteText">Palette <span class="hint">(optional - paste hex, or load a .hex file)</span></label>
      <textarea id="paletteText" rows="3" placeholder="#1a1a2e, #16213e, ...   (or one hex per line)"></textarea>
      <div class="row">
        <input type="file" id="paletteFile" accept=".hex,text/plain" />
      </div>
      <div class="presets">
        <span class="pgroup"><b>色相</b><button type="button" data-preset="warm">暖色</button><button type="button" data-preset="cool">寒色</button></span>
        <span class="pgroup"><b>明度</b><button type="button" data-preset="light">明るい</button><button type="button" data-preset="dark">暗い</button></span>
        <span class="pgroup"><b>彩度</b><button type="button" data-preset="vivid">鮮やか</button><button type="button" data-preset="muted">くすみ</button></span>
        <span class="pgroup"><b>関係性</b><button type="button" data-preset="complementary">補色</button><button type="button" data-preset="analogous">類似</button><button type="button" data-preset="triadic">三色</button></span>
        <button type="button" data-preset="all">すべてON</button>
      </div>
      <div id="swatches" class="swatches"></div>
      <div id="paletteCount" class="hint"></div>
    </div>

    <div class="row">
      <label><input type="checkbox" id="limitColors" /> Limit colors</label>
      <input type="range" id="kSlider" min="2" max="64" value="16" disabled />
      <output id="kValue">16</output>
      <span class="hint">(off = 16 colors)</span>
    </div>

    <div class="row">
      <button id="run" disabled>Snap pixels</button>
      <a id="download" download="snapped.png" hidden><button type="button">Download PNG</button></a>
    </div>
    <div id="status">Loading WASM...</div>

    <div class="previews">
      <figure><figcaption>Before</figcaption><img id="before" alt="input preview" /></figure>
      <figure><figcaption>After</figcaption><img id="after" alt="result preview" /></figure>
    </div>

    <figure class="actual" id="actualFig" hidden>
      <figcaption>Actual size (1:1) <span id="actualSize" class="hint"></span></figcaption>
      <div class="actual-box"><img id="actual" alt="actual-size result" /></div>
    </figure>

    <script type="module" src="./main.js"></script>
  </body>
</html>
